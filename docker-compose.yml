services:
  app:
    image: ghcr.io/yazir/ab-image-tester:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - app_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup app
    profiles:
      - auto-update

volumes:
  app_data:

services:
  app:
    image: ghcr.io/your-username/ab-image-tester:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - app_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    labels:
      - "com.centurylinklabs.watchtower.scope=ab-image-tester"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --scope ab-image-tester
    profiles:
      - auto-update

volumes:
  app_data:

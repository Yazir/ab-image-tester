# Anubis bot policy — each rule has a name, matching criteria, and action.
# Actions: ALLOW (pass through), CHALLENGE (PoW), DENY (block).
# First match wins. If no rule matches, the default action is ALLOW.
#
# See https://github.com/TecharoHQ/anubis

bots:
  - name: "Search engine bots"
    user_agent_regex: "(Googlebot|Bingbot|DuckDuckBot|Slurp|YandexBot|facebookexternalhit|Twitterbot|LinkedInBot|Applebot|Discordbot)"
    action: ALLOW

  - name: "Nginx health check"
    user_agent_regex: "nginx-healthcheck"
    action: ALLOW

  - name: "Static assets"
    path_regex: "^/(assets/|js/|styles/|favicon\\.ico)"
    action: ALLOW

  - name: "generic-browser"
    user_agent_regex: "Mozilla"
    action: CHALLENGE
    challenge:
      difficulty: 4
      algorithm: metarefresh
